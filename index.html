<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagi Nasabah BCA Tercinta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .carousel {
            width: 100%;
        }

        .carousel img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .content h1 {
            font-size: 1.6rem;
            color: #1a2a3a;
            margin-bottom: 8px;
        }

        .content p {
            font-size: 1rem;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn-saldo {
            display: inline-block;
            padding: 14px 40px;
            background-color: #0066b3;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(0,102,179,0.3);
        }

        .btn-saldo:hover {
            background-color: #004d8c;
            transform: translateY(-2px);
        }

        .btn-saldo:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="carousel">
            <!-- Replace 'photo.jpg' with your actual image filename -->
            <img src="photo.jpg" alt="Pagi Nasabah BCA Tercinta">
        </div>

        <div class="content">
            <h1>☀️ Pagi Nasabah BCA Tercinta</h1>
            <p>Selamat pagi! Semoga hari ini penuh semangat, rezeki lancar, dan transaksi sukses.</p>
            <a href="https://wa.me/6281234567890" class="btn-saldo">💳 Cek Saldo Anda</a>
            <div class="footer">📱 #BCA #PagiNasabah</div>
        </div>
    </div>

</body>
</html>
